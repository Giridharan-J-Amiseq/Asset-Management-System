<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets | WorkSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="static/css/style.css" rel="stylesheet">
</head>
<body data-page="assets">
    <div class="ws-page-wrapper" style="display: none;">
        <div class="container-lg py-5">
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3">Assets</h1>
                    <p class="text-muted">Manage your organization's assets</p>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAssetModal">
                    <i class="bi bi-plus-circle"></i> Add Asset
                </button>
            </div>

            <!-- Filters -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search assets...">
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="statusFilter">
                                <option value="">All Status</option>
                                <option value="Available">Available</option>
                                <option value="Assigned">Assigned</option>
                                <option value="In Repair">In Repair</option>
                                <option value="Retired">Retired</option>
                                <option value="Lost">Lost</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="typeFilter">
                                <option value="">All Types</option>
                                <option value="Laptop">Laptop</option>
                                <option value="Desktop">Desktop</option>
                                <option value="Server">Server</option>
                                <option value="Furniture">Furniture</option>
                                <option value="Printer">Printer</option>
                                <option value="Phone">Phone</option>
                                <option value="Monitor">Monitor</option>
                                <option value="UPS">UPS</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select" id="departmentFilter">
                                <option value="">All Departments</option>
                                <option value="IA">Intelligent Automation (IA)</option>
                                <option value="Cyber Security">Cyber Security</option>
                                <option value="IT Administration">IT Administration</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Assets Table -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <div id="assetTableContainer"></div>
                    
                    <!-- Pagination -->
                    <nav id="paginationNav" style="display: none;">
                        <ul class="pagination justify-content-center mt-4">
                            <li class="page-item" id="prevPage">
                                <a class="page-link" href="#">Previous</a>
                            </li>
                            <li class="page-item" id="pageInfo">
                                <span class="page-link">Page 1</span>
                            </li>
                            <li class="page-item" id="nextPage">
                                <a class="page-link" href="#">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Asset Modal -->
    <div class="modal fade" id="addAssetModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Asset</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addAssetForm" class="ws-form">
                        <!-- Asset Information Section -->
                        <div class="mb-4">
                            <h6 class="border-bottom pb-2">Asset Information</h6>
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Asset Name *</label>
                                    <input type="text" class="form-control" name="asset_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Asset Type *</label>
                                    <select class="form-select" name="asset_type" required id="assetTypeSelect">
                                        <option value="">Select Asset Type</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Serial Number *</label>
                                    <input type="text" class="form-control" name="serial_number" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Category *</label>
                                    <select class="form-select" name="category" required>
                                        <option value="">Select Category</option>
                                        <option value="IT">IT</option>
                                        <option value="Non-IT">Non-IT</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Model</label>
                                    <input type="text" class="form-control" name="model">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Brand</label>
                                    <input type="text" class="form-control" name="brand">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Specifications</label>
                                    <textarea class="form-control" name="specifications" rows="2"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Purchase Information Section -->
                        <div class="mb-4">
                            <h6 class="border-bottom pb-2">Purchase Information</h6>
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Purchase Date</label>
                                    <input type="date" class="form-control" name="purchase_date">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Purchase Cost</label>
                                    <input type="number" class="form-control" name="purchase_cost" step="0.01">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Vendor Name</label>
                                    <input type="text" class="form-control" name="vendor_name">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Invoice Number</label>
                                    <input type="text" class="form-control" name="invoice_number">
                                </div>
                            </div>
                        </div>

                        <!-- Warranty Information Section -->
                        <div class="mb-4">
                            <h6 class="border-bottom pb-2">Warranty Information</h6>
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Warranty Start Date</label>
                                    <input type="date" class="form-control" name="warranty_start_date">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Warranty Expiry (Years)</label>
                                    <input type="number" class="form-control" name="warranty_expiry" min="0">
                                </div>
                            </div>
                        </div>

                        <!-- Status & Organization Section -->
                        <div class="mb-4">
                            <h6 class="border-bottom pb-2">Status & Organization</h6>
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Asset Status *</label>
                                    <select class="form-select" name="asset_status" required>
                                        <option value="">Select Status</option>
                                        <option value="Available" selected>Available</option>
                                        <option value="Assigned">Assigned</option>
                                        <option value="In Repair">In Repair</option>
                                        <option value="Retired">Retired</option>
                                        <option value="Lost">Lost</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Condition Status *</label>
                                    <select class="form-select" name="condition_status" required>
                                        <option value="">Select Condition</option>
                                        <option value="New" selected>New</option>
                                        <option value="Good">Good</option>
                                        <option value="Damaged">Damaged</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Location *</label>
                                    <select class="form-select" name="location" required id="locationSelect">
                                        <option value="">Select Location</option>
                                        <option value="Chennai" selected>Chennai</option>
                                        <option value="Pune">Pune</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Department *</label>
                                    <select class="form-select" name="department" required>
                                        <option value="">Select Department</option>
                                        <option value="IA">Intelligent Automation (IA)</option>
                                        <option value="Cyber Security">Cyber Security</option>
                                        <option value="IT Administration">IT Administration</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="submitAssetBtn">
                        <i class="bi bi-plus-circle"></i> Create Asset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Asset Detail Modal -->
    <div class="modal fade" id="assetModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Asset Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="assetModalBody">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div class="modal fade" id="qrModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">QR Code</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center" id="qrModalBody">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/auth.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 10;

        async function loadAssets() {
            const searchValue = document.getElementById("searchInput")?.value || "";
            const statusValue = document.getElementById("statusFilter")?.value || "";
            const typeValue = document.getElementById("typeFilter")?.value || "";
            const departmentValue = document.getElementById("departmentFilter")?.value || "";

            try {
                let url = `/assets?page=${currentPage}&page_size=${pageSize}`;
                if (searchValue) url += `&search=${encodeURIComponent(searchValue)}`;
                if (statusValue) url += `&status_filter=${encodeURIComponent(statusValue)}`;
                if (typeValue) url += `&type_filter=${encodeURIComponent(typeValue)}`;
                if (departmentValue) url += `&department=${encodeURIComponent(departmentValue)}`;

                const response = await API.get(url);
                renderAssets(response.items);
                updatePagination(response.page, response.page_size, response.total);
            } catch (error) {
                showToast("Error loading assets", "error");
                console.error(error);
            }
        }

        function renderAssets(assets) {
            const columns = [
                { label: "Asset ID", key: "qr_code_value" },
                { label: "Asset Name", key: "asset_name" },
                { label: "Type", key: "asset_type" },
                { label: "Serial Number", key: "serial_number" },
                { label: "Location", key: "location" },
                { label: "Department", key: "department" },
                { label: "Status", key: "asset_status", render: (row) => statusBadge(row.asset_status) },
                { label: "QR Code", key: "qr_code_image_url", render: (row) => renderQRCode(row) },
                { label: "Actions", key: "asset_id", render: (row) => renderActions(row) }
            ];
            renderTable("assetTableContainer", columns, assets);
        }

        function renderQRCode(row) {
            if (!row.qr_code_image_url) {
                return '-';
            }
            return `<img src="${row.qr_code_image_url}" alt="QR Code" class="img-thumbnail" style="width: 60px; height: 60px; cursor: pointer;" onclick="viewQRModal('${row.qr_code_image_url}', '${row.qr_code_value}')">`;
        }

        function viewQRModal(imageUrl, qrValue) {
            document.getElementById("qrModalBody").innerHTML = `
                <img src="${imageUrl}" alt="QR Code" class="img-fluid mb-3" style="max-width: 300px;">
                <p><strong>Asset ID:</strong> ${qrValue}</p>
            `;
            new bootstrap.Modal(document.getElementById("qrModal")).show();
        }

        function renderActions(row) {
            return `
                <a href="asset_detail.html?id=${row.asset_id}" class="btn btn-sm btn-info">View</a>
            `;
        }

        function updatePagination(page, pageSize, total) {
            const totalPages = Math.ceil(total / pageSize);
            document.getElementById("pageInfo").innerHTML = `<span class="page-link">Page ${page} of ${totalPages}</span>`;
            
            document.getElementById("prevPage").style.display = page > 1 ? "" : "none";
            document.getElementById("nextPage").style.display = page < totalPages ? "" : "none";
            
            document.getElementById("paginationNav").style.display = totalPages > 1 ? "" : "none";

            document.getElementById("prevPage").onclick = (e) => { e.preventDefault(); currentPage--; loadAssets(); };
            document.getElementById("nextPage").onclick = (e) => { e.preventDefault(); currentPage++; loadAssets(); };
        }

        document.addEventListener("DOMContentLoaded", async function() {
            Auth.requireAuth(); // Use requireAuth instead which is in auth.js
            await initAssetsPage(); // Use main.js initialization
        });
    </script>
</body>
</html>
